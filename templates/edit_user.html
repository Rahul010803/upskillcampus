{% extends 'base.html' %}
{% block body %}

<h2>Add Medicine</h2>
<ol class="breadcrumb mb-4"> 
    <li class="breadcrumb-item"><a href="{{ url_for('dashboard')}}">Dashboard</a></li>
    <li class="breadcrumb-item"><a href="{{ url_for('user_management')}}">User Management</a></li>
    <li class="breadcrumb-item active">Edit User</li>
  </ol>
<div class="card mb-4">
    <div class="card-header"> 
        <div class="card-body">
            <form class="row g-3" method="POST" action="{{ url_for('edit_user', userid=user.userid) }}">
                <div class="col-md-6">
                    <label for="name" class="form-label">User Name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="User Name" value="{{ user.name}}" ><br>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" placeholder="Email" value="{{ user.email}}"><br>
                </div>

                <div class="col-md-6">
                    <label for="password" class="form-label">Password</label>
                    <input type="text" class="form-control" name="password" placeholder="Password" value="{{ user.password}}"><br>
                </div>

                <div class="col-md-6">
                    <label for="role" class="form-label">Role</label>
                    <select id="role" class="form-select" name="role">
                        <option selected value="{{ user.role}}">{{ user.role}}</option>
                        {% if user.role=='admin' %}
                        <option value="biller">biller</option>
                        {% else %}
                        <option value="admin">admin</option>
                        {% endif %}
                    </select>
                </div>
                

                <div class="col-12">
                    <button type="submit" class="btn btn-primary" value="Add User">Edit User</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock body %}
