<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>User Login Form</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
	<style>
		body {
			background-color: white;
			font-family: Arial, sans-serif;
			background-image: url({{ url_for('static', filename='images/med.jpg') }});
			background-position: center center;
			background-repeat: no-repeat;
			background-attachment: fixed; /* Optional: Keeps the background image fixed while scrolling */
			background-size: cover;
		}
		
		.container {
			max-width: 400px;
			margin: 0 auto;
			padding-top: 50px;
		}
		
		.login-container {
			background-color: #ffffff;
			padding: 20px;
			border-radius: 8px;
			box-shadow: 0px 0px 10px 0px rgba(0, 0, 0, 0.1);
		}
		
		h2 {
			text-align: center;
			margin-bottom: 30px;
		}
		
		.form-group {
			margin-bottom: 20px;
		}
		
		.btn-primary {
			width: 100%;
		}
		
		.bottom {
			text-align: center;
			margin-top: 20px;
		}
		
		.bottom a {
			color: #007bff;
			text-decoration: none;
		}
		
		.bottom a:hover {
			text-decoration: underline;
		}
		
	</style>

</head>

<body>
	
	<div class="container">

		<h2>User Login</h2>
		<form action="{{ url_for('login') }}" method="post">
			
			<div class="form-group">
				<label for="email">Email:</label>
				<input type="email" class="form-control" id="email" name="email" placeholder="Enter email" name="email" required>
			</div>
			<div class="form-group">
				<label for="pwd">Password:</label>
				<input type="password" class="form-control" id="password" name="password" placeholder="Enter password"
					name="pswd" required>
			</div>
			<p2 id="alert">{{message}}</p1>
				<br>
				<button type="submit" class="btn btn-primary">Login</button>
				<p class="bottom">Dont't have an account? <a class="bottom" href="{{url_for('register')}}"> Register
						here</a></p>
		</form>
	</div>


</body>

</html>
