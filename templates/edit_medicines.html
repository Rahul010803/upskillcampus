{% extends 'base.html' %}
{% block body %}

<h2>Edit Medicine</h2>
<ol class="breadcrumb mb-4">
    <li class="breadcrumb-item"><a href="{{ url_for('dashboard')}}">Dashboard</a></li>
    <li class="breadcrumb-item"><a href="{{ url_for('manage_medicines')}}">Manage Medicines</a></li>
    <li class="breadcrumb-item active">Edit Medicine</li>
</ol>
<div class="card mb-4">
    <div class="card-header">
        <div class="card-body">
            <form class="row g-3" method="POST"
                action="{{ url_for('edit_medicines', medicine_id=medicine.medicine_id) }}">

                <div class="col-md-6">
                    <label for="medicine_name" class="form-label">Medicine Name</label>
                    <input type="text" class="form-control" name="medicine_name" placeholder="Medicine Name"
                        value="{{ medicine.medicine_name }}"><br>
                </div>
                <div class="col-md-6">
                    <label for="company" class="form-label">Company</label>
                    <select id="company" class="form-select" name="company">
                        {% for company_row in companies %}
                        {% for column_value in company_row %}
                        {% if column_value == medicine.company %}
                        <option value="{{ column_value }}" selected>{{ column_value }}</option>
                        {% else %}
                        <option value="{{ column_value }}">{{ column_value }}</option>
                        {% endif %}
                        {% endfor %}
                        {% endfor %}
                    </select>
                </div>
                <div class="col-6">
                    <label for="pack_detail" class="form-label">Single Pack Quantity</label>
                    <input type="number" class="form-control" name="pack_detail" placeholder="Single Pack Quantity"
                        value="{{ medicine.single_pack_quantity }}" required><br>
                </div>

                <div class="col-6">
                    <label for="available_qty" class="form-label">Available Quantity</label>
                    <input type="number" class="form-control" name="available_qty" placeholder="Available Quantity"
                        value="{{ medicine.available_qty }}" required><br>
                </div>


                <div class="col-6">
                    <label for="category" class="form-label">Category</label>
                    <select id="category" class="form-select" name="category">
                        {% for category_row in categories %}
                        {% for column_value in category_row %}
                        {% if column_value == medicine.category_name %}
                        <option value="{{ column_value }}" selected>{{ column_value }}</option>
                        {% else %}
                        <option value="{{ column_value }}">{{ column_value }}</option>
                        {% endif %}
                        {% endfor %}
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="location_rack" class="form-label">Location Rack</label>
                    <select id="location_rack" class="form-select" name="location_rack">
                        {% for category_row in racks %}
                        {% for column_value in category_row %}
                        {% if column_value == medicine.location_rack %}
                        <option value="{{ column_value }}" selected>{{ column_value }}</option>
                        {% else %}
                        <option value="{{ column_value }}">{{ column_value }}</option>
                        {% endif %}
                        {% endfor %}
                        {% endfor %}
                    </select>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary" value="Edit Medicine">Edit Medicine</button>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock body %}
